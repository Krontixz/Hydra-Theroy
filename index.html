<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Hydra Record Game</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-site-verification" content="gV-ZipfbYFniNXdVZ41YIcbrm2m-536_q1ELLlaK3SE" />
</head>
<body>
    <div id="login-screen" class="container">
        <h1>Hydra Protocol</h1>
        <p>Identify yourself, Researcher:</p>
        <input type="text" id="username-input" placeholder="Username...">
        <button onclick="startGame()">INITIALIZE</button>
    </div>

    <div id="game-container" class="container" style="display: none;">
        <h1>The Hydra Challenge</h1>
        <p>Logged in as: <span id="user-display" style="color: #4ecca3;"></span></p>
        
        <div id="hydra-display">
            <span id="heads">🐉🐉🐉</span>
        </div>

        <div class="stats">
            <p>Current Step: <span id="step-count">0</span></p>
            <p>Hydra Complexity: <span id="complexity">3</span></p>
        </div>

        <button class="btn-bb" onclick="applyBusyBeaver()">BUSY BEAVER BOOST</button>
        <button class="btn-chop" onclick="chop()">CHOP HEAD</button>
        <button class="btn-save" onclick="saveRecord()">UPLOAD RECORD</button>
        
        <div class="leaderboard-box">
            <h3>🏆 GLOBAL RANKINGS</h3>
            <div id="leaderboard-content">
                </div>
        </div>
        
        <hr>
        <a href="answer.html">View the Record-Breaking Proof</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
